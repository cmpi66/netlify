baseURL = "https://notes.munozpi.com"
title = "Munozpi Notes"
languageCode = "en-us"
defaultContentLanguage = "en-us"

enableEmoji = true
enableRobotsTXT = true

[module]
[[module.imports]]
path = "github.com/hugo-sid/hugo-blog-awesome"

[pagination]
pagerSize = 10

##############################
# MARKUP
##############################

[markup]
[markup.highlight]
noClasses = false
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
startLevel = 2
endLevel = 4
ordered = false

##############################
# MENU
##############################

[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 2

[[menu.main]]
name = "About"
url = "/about/"
weight = 3

##############################
# PARAMS (THEME CORE)
##############################

[params]
sitename = "Munozpi Notes"
defaultColor = "light"
description = "Notes on Linux, cybersecurity, homelab, and systems"
mainSections = ["posts"]

toc = true
tocOpen = false
goToTop = true

dateFormat = ""

##############################
# AUTHOR
##############################

[params.author]
name = "Chris Munoz"
intro = "Security, systems, and automation"
description = "Building leverage through technical depth"
# avatar = "avatar.jpg"  # optional (put in assets/)

##############################
# SOCIALS
##############################

[[params.socialIcons]]
name = "github"
url = "https://github.com/cmpi66"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

##############################
# SERVICES (optional)
##############################

[services]
[services.googleAnalytics]
id = ""

[services.disqus]
shortname = ""
